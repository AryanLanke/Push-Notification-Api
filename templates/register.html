<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Device — Notification Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #07071a;
            --surface: #10102a;
            --surface2: #181836;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #06b6d4;
            --accent2: #7c3aed;
            --success: #10b981;
            --danger: #ef4444;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 36px;
            background: rgba(16, 16, 42, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 6px;
        }

        .nav-link {
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            color: var(--muted);
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .nav-link.active {
            color: #fff;
            background: rgba(6, 182, 212, 0.15);
            border-color: rgba(6, 182, 212, 0.3);
        }

        .main {
            max-width: 580px;
            margin: 0 auto;
            padding: 52px 24px;
        }

        .page-header {
            margin-bottom: 36px;
        }

        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .page-header p {
            color: var(--muted);
            margin-top: 8px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .label-required::after {
            content: ' *';
            color: var(--danger);
        }

        input,
        select {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            margin-bottom: 18px;
            transition: border 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* Type selector cards */
        .type-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .type-card {
            padding: 14px 10px;
            border-radius: 10px;
            border: 2px solid var(--border);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface2);
        }

        .type-card:hover {
            border-color: rgba(6, 182, 212, 0.4);
        }

        .type-card.selected {
            border-color: var(--accent);
            background: rgba(6, 182, 212, 0.08);
        }

        .type-card .t-icon {
            font-size: 1.6rem;
            display: block;
            margin-bottom: 4px;
        }

        .type-card .t-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--muted);
        }

        .type-card.selected .t-label {
            color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #0891b2, var(--accent));
            color: #fff;
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(6, 182, 212, 0.45);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #result {
            margin-top: 20px;
            padding: 16px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            display: none;
            animation: fadeUp 0.3s ease;
        }

        #result.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        #result.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        .result-id {
            font-family: monospace;
            font-size: 0.75rem;
            margin-top: 6px;
            color: var(--muted);
            word-break: break-all;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">🔔 Notification Generator</div>
        <div class="nav-links">
            <a href="/register" class="nav-link active">📡 Register Device</a>
            <a href="/" class="nav-link">🛠 Admin Panel</a>
        </div>
    </nav>

    <div class="main">
        <div class="page-header">
            <h1>📡 Register a Device</h1>
            <p>
                Add a new Consumer Device to the system. Once registered, the Generator
                will include this device when broadcasting notifications.
                Each device must be running a Consumer app on its specified port.
            </p>
        </div>

        <div class="card">

            <label class="label-required">Device Name</label>
            <input id="name" type="text" placeholder="e.g. Flipkart-App or Office-PC" />

            <label>Device Type</label>
            <div class="type-grid">
                <div class="type-card selected" data-type="web" onclick="selectType('web', this)">
                    <span class="t-icon">🌐</span><span class="t-label">Web</span>
                </div>
                <div class="type-card" data-type="mobile" onclick="selectType('mobile', this)">
                    <span class="t-icon">📱</span><span class="t-label">Mobile</span>
                </div>
                <div class="type-card" data-type="pager" onclick="selectType('pager', this)">
                    <span class="t-icon">📟</span><span class="t-label">Pager</span>
                </div>
            </div>
            <input type="hidden" id="deviceType" value="web" />

            <div class="row">
                <div>
                    <label>IP Address</label>
                    <input id="ip" type="text" value="127.0.0.1" />
                </div>
                <div>
                    <label>Port</label>
                    <input id="port" type="number" value="5001" />
                </div>
            </div>

            <label>Email (optional)</label>
            <input id="email" type="email" placeholder="device@example.com" />

            <button class="btn" id="regBtn" onclick="registerDevice()">
                <span>📡</span> Register Device
            </button>

            <div id="result">
                <div id="resultMsg"></div>
                <div class="result-id" id="resultId"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000';
        let selectedType = 'web';

        function selectType(type, el) {
            document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedType = type;
            // Auto-fill default port hints
            const portEl = document.getElementById('port');
            if (type === 'web') portEl.value = '5001';
            if (type === 'mobile') portEl.value = '8080';
            if (type === 'pager') portEl.value = '6000';
        }

        async function registerDevice() {
            const name = document.getElementById('name').value.trim();
            const ip = document.getElementById('ip').value.trim();
            const port = parseInt(document.getElementById('port').value);
            const email = document.getElementById('email').value.trim();
            const res = document.getElementById('result');
            const msg = document.getElementById('resultMsg');
            const rid = document.getElementById('resultId');

            if (!name) {
                res.className = 'error'; msg.textContent = '⚠ Device name is required.';
                rid.textContent = ''; res.style.display = 'block'; return;
            }

            const btn = document.getElementById('regBtn');
            btn.disabled = true; btn.innerHTML = '<span>⏳</span> Registering...';
            res.style.display = 'none';

            try {
                const r = await fetch(`${API}/devices/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, device_type: selectedType, ip_address: ip, port, email })
                });
                const data = await r.json();

                if (data.success) {
                    res.className = 'success';
                    msg.textContent = `✅ "${name}" registered successfully as a ${selectedType.toUpperCase()} device!`;
                    rid.textContent = `Device ID: ${data.device.device_id}  |  Address: ${data.device.address}`;
                    document.getElementById('name').value = '';
                    document.getElementById('email').value = '';
                } else {
                    res.className = 'error';
                    msg.textContent = `❌ ${data.error}`;
                    rid.textContent = data.hint || '';
                }
                res.style.display = 'block';
            } catch (e) {
                res.className = 'error';
                msg.textContent = '❌ Cannot reach Generator API. Is app_pure.py running?';
                rid.textContent = '';
                res.style.display = 'block';
            }

            btn.disabled = false; btn.innerHTML = '<span>📡</span> Register Device';
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', e => { if (e.key === 'Enter') registerDevice(); });
    </script>
</body>

</html>
